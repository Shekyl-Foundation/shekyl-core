[package]
name = "shekyl-fcmp"
description = "FCMP++ full-chain membership proofs with Shekyl PQC extensions (4-scalar leaf)"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
# Upstream FCMP++ crates from Shekyl-Foundation fork.
# IMPORTANT: The fcmp++ branch must be fetched from upstream monero-oxide/monero-oxide
# into the Shekyl-Foundation fork before this dependency resolves.
monero-fcmp-plus-plus = { git = "https://github.com/Shekyl-Foundation/monero-oxide", branch = "fcmp++", default-features = false, features = ["std", "compile-time-generators"] }
monero-generators = { git = "https://github.com/Shekyl-Foundation/monero-oxide", branch = "fcmp++" }
helioselene = { git = "https://github.com/Shekyl-Foundation/monero-oxide", branch = "fcmp++" }
dalek-ff-group = "0.5"
ciphersuite = "0.4"
ec-divisors = { git = "https://github.com/Shekyl-Foundation/monero-oxide", branch = "fcmp++", features = ["ed25519"] }
curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "zeroize"] }

# Crypto primitives
blake2 = "0.10"
sha2 = "0.10"
zeroize = { version = "1", features = ["derive"] }
rand_core = { version = "0.6", features = ["std"] }

# Local crates
shekyl-crypto-pq = { path = "../shekyl-crypto-pq" }

thiserror.workspace = true
serde.workspace = true

[dev-dependencies]
rand = "0.8"
serde_json = "1"

[features]
default = ["std"]
std = []
