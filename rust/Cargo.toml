[workspace]
members = [
    "shekyl-ffi",
    "shekyl-fcmp",
    "shekyl-crypto-pq",
    "shekyl-crypto-hash",
    "shekyl-consensus",
    "shekyl-economics",
    "shekyl-staking",
    "shekyl-economics-sim",
    "shekyl-wallet-rpc",
    "shekyl-daemon-rpc",
]
resolver = "2"

[workspace.package]
version = "2.0.0"
edition = "2021"
license = "BSD-3-Clause"
repository = "https://github.com/radawson/Shekyl"

[workspace.dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }

[workspace.lints.clippy]
