[package]
# Renamed from upstream `shekyl-address` to avoid a workspace name collision
# with shekyl-core's first-party `shekyl-address` crate (Bech32m). This
# fork-side crate implements CryptoNote-style legacy/integrated addresses
# inherited from monero-serai. See `docs/SHEKYL_OXIDE_VENDORING.md` for the
# integration-patch policy and the matching fork PR that reconciles this
# divergence upstream.
name = "shekyl-oxide-address"
version = "0.1.0"
description = "CryptoNote-style legacy address codec for monero-oxide consumers"
license = "MIT"
repository = "https://github.com/Shekyl-Foundation/shekyl-oxide/tree/main/shekyl-oxide/wallet/address"
authors = ["Luke Parker <lukeparker5132@gmail.com>", "Shekyl Foundation <dev@shekyl.org>"]
edition = "2021"
rust-version = "1.66"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
thiserror = { version = "2", default-features = false }

zeroize = { version = "^1.5", default-features = false, features = ["zeroize_derive"] }

curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "zeroize"] }

shekyl-io = { path = "../../io", default-features = false }
shekyl-base58 = { path = "../base58", default-features = false }

[dev-dependencies]
rand_core = { version = "0.6", default-features = false, features = ["std"] }

hex-literal = { version = ">= 0.4, <= 1", default-features = false }
hex = { version = "0.4", default-features = false, features = ["alloc"] }

serde = { version = "1", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }

[features]
std = [
  "thiserror/std",

  "zeroize/std",

  "shekyl-io/std",
  "shekyl-base58/std",
]
default = ["std"]
