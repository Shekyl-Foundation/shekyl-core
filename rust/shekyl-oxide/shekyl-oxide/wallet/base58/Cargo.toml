[package]
name = "shekyl-base58"
version = "0.1.0"
description = "Rust implementation of Shekyl's base58 encoding scheme"
license = "MIT"
repository = "https://github.com/Shekyl-Foundation/shekyl-oxide/tree/main/shekyl-oxide/wallet/base58"
authors = ["Luke Parker <lukeparker5132@gmail.com>", "Shekyl Foundation <dev@shekyl.org>"]
edition = "2021"
rust-version = "1.66"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
std-shims = { version = "0.1.5", default-features = false }
shekyl-primitives = { path = "../../primitives", default-features = false }

[dev-dependencies]
rand_core = { version = "0.6", default-features = false, features = ["std"] }

[features]
std = [
  "std-shims/std",
  "shekyl-primitives/std",
]
default = ["std"]
