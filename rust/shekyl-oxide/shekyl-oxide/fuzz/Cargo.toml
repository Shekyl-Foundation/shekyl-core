[[bin]]
name = "fuzz_transaction_read"
path = "fuzz_targets/fuzz_transaction_read.rs"
doc = false

[[bin]]
name = "fuzz_rct_base_read"
path = "fuzz_targets/fuzz_rct_base_read.rs"
doc = false
