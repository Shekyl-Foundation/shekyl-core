#
# Consensus-invariants gate — verifies, at source level, that the
# LWMA-1 cutover (Phase 4 of `docs/design/DAA_LWMA1_PLAN.md`) and
# subsequent consensus-affecting deletions remain swept:
#
#   1. No live consumers of the deleted CryptoNote DAA functions
#      `next_difficulty` / `next_difficulty_64`.
#   2. No C-ABI declarations in `rust/shekyl-difficulty/src/` (the
#      C ABI lives in `rust/shekyl-ffi` per `25-rust-architecture.mdc`).
#   3. No orphaned references to the `DIFFICULTY_*` /
#      `CRYPTONOTE_BLOCK_FUTURE_TIME_LIMIT` /
#      `BLOCKCHAIN_TIMESTAMP_CHECK_WINDOW` /
#      `CRYPTONOTE_LOCKED_TX_ALLOWED_DELTA_SECONDS_V1` `#define`s
#      that Phase 4 deleted from `src/cryptonote_config.h`.
#
# Forward-compatibility note: this workflow is the shared landing
# pad for consensus-invariant grep gates. The RandomX v2 Phase 2f
# work (`docs/design/RANDOMX_V2_PLAN.md` §7.1 / §7.2) appends its
# symbol-isolation and no-C-ABI checks to
# `scripts/ci/check_consensus_invariants.sh` when it lands; the
# workflow itself does not need to change.
#
# Structure mirrors `.github/workflows/zeroize-check.yml`:
# single job, single runner, fast-running.

name: ci/consensus-invariants

on:
  pull_request:
    branches: [dev]
    paths:
      - "src/**"
      - "tests/**"
      - "rust/shekyl-difficulty/**"
      - "rust/shekyl-ffi/**"
      - "scripts/ci/check_consensus_invariants.sh"
      - ".github/workflows/consensus-invariants.yml"

permissions:
  contents: read

jobs:
  check-consensus-invariants:
    name: "Consensus-invariants grep gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ripgrep is load-bearing for all three invariants in the gate
      # script; the script's `command -v rg` precondition exits 2 if it
      # is missing. `ubuntu-latest` ships without `rg`, so install it
      # explicitly here.
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ripgrep
          rg --version

      - name: Run consensus-invariants check
        run: scripts/ci/check_consensus_invariants.sh
