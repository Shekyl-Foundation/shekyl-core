#
# CI-side enforcement of the 64-bit-only CMake gate (Tripwire D, Chore #3
# v3.1.0-alpha.5). Without this workflow, the gate's placement (above every
# find_package / include / add_subdirectory) is honor-system; a PR that
# moves the gate below a probe would only be caught by review. This
# workflow catches that class of regression mechanically.
#
# See tests/cmake-gate-test/run.sh for the assertion mechanics and
# docs/CHANGELOG.md "Retired 32-bit build targets" for the underlying
# PQC constant-time argument.

name: cmake-gate-test

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  cmake-gate-test:
    name: 64-bit-only CMake gate fires on fake 32-bit toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          submodules: false

      - name: install cmake
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake

      - name: run gate test
        run: ./tests/cmake-gate-test/run.sh
