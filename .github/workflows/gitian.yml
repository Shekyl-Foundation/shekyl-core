name: ci/gh-actions/gitian

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v3.0.2-RC1)'
        required: true
      repo_url:
        description: 'Repository URL override (leave empty for default)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITIAN_REPO_URL: ${{ inputs.repo_url || format('https://github.com/{0}', github.repository) }}
  GITIAN_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build-gitian:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        operating-system:
          - name: "Linux"
            option: "l"
          - name: "Windows"
            option: "w"
          - name: "Android"
            option: "a"
          - name: "FreeBSD"
            option: "f"
          - name: "macOS"
            option: "m"
    name: ${{ matrix.operating-system.name }}
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: prepare
      run: |
        sudo apt update
        chmod +x contrib/gitian/gitian-build.py
    - name: setup
      run: |
        ./contrib/gitian/gitian-build.py --setup --docker --url "$GITIAN_REPO_URL" github-actions "$GITIAN_TAG"
    - name: build
      run: |
        ./contrib/gitian/gitian-build.py --docker --detach-sign --no-commit --build -j 3 -o ${{ matrix.operating-system.option }} --url "$GITIAN_REPO_URL" github-actions "$GITIAN_TAG"
    - name: post build
      run: |
        cd "out/$GITIAN_TAG"
        shasum -a256 *
        echo \`\`\` >> $GITHUB_STEP_SUMMARY
        shasum -a256 * >> $GITHUB_STEP_SUMMARY
        echo \`\`\` >> $GITHUB_STEP_SUMMARY
    - uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.operating-system.name }}
        path: |
          out/${{ env.GITIAN_TAG }}/*
