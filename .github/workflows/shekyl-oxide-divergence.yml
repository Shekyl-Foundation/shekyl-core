name: shekyl-oxide divergence

# Layered defense for the rust/shekyl-oxide vendored subtree.
#
#   Layer 1: .githooks/pre-commit (local, opt-in via `git config core.hooksPath`)
#   Layer 2: oxide-tree-equality on PRs targeting dev/main (this file)
#   Layer 3: oxide-tree-equality on push to dev/main
#   Layer 4: daily hash-only tripwire (compare-upstream-tip below)
#
# OBSERVE-ONLY ROLLOUT.  oxide-tree-equality reports as a status check but
# is NOT in the dev branch protection required-checks list yet. After Step 2
# of the vendored-oxide remediation plan lands clean and this job has been
# green for a release cycle, flip branch protection to mark it required
# (Step 4b). Until then, divergence reports are surfaced but do not block
# merges, so this can land without coordinating with any in-flight PR.
#
# The job uses an "always-runs wrapper" rather than a path filter, because
# GitHub's required-status-check + paths-filter interaction is a footgun:
# paths-filtered checks that don't run report as "skipped", and whether
# "skipped" counts as "passed" depends on how branch protection is
# configured. The script fast-paths on cache hit when nothing relevant
# changed, so the wall cost of always-running is small and the semantic
# cost of getting the configuration wrong is zero.

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  schedule:
    - cron: "0 4 * * *"  # daily 04:00 UTC — Layer 4 tripwire (hash-only)
  workflow_dispatch:

# Cancel superseded runs on the same PR/branch to keep CI cycles tight.
concurrency:
  group: shekyl-oxide-divergence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ============================================================================
  # SELF-TEST.
  #
  # Authorized-but-broken edits to the script are the failure mode that the
  # SHA-256 pin alone cannot catch. This job creates two synthetic trees,
  # mutates one of them at both a deep path (crypto/fcmps/src/lib.rs) AND a
  # shallow path (crypto/Cargo.toml), runs the script in self-test mode, and
  # asserts both mutations are reported. If either is missed, the workflow
  # fails — breaking the circular trust where Layer 4 would otherwise depend
  # on the same possibly-broken script as Layers 2/3.
  # ============================================================================
  selftest:
    name: oxide-tree-equality / self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify script SHA-256 pin
        env:
          # The pin is inlined here (not a separate *.sha256 file) so it's
          # visible at the call site during review and immune to .gitignore
          # rules. Updates to the script must also update this constant in
          # the same PR; that is the audit trail. Future contributors: do
          # not move this to an external file without confirming the
          # destination is tracked by git (Shekyl's .gitignore excludes
          # *.sha256 by default for build-product hygiene).
          PINNED_SHA256: ca85ec424e65bb6fec616165759f77feb509a75481d2934666c529049aefe67f
        run: |
          ACTUAL=$(sha256sum scripts/ci/check_oxide_divergence.sh | awk '{print $1}')
          if [ "$ACTUAL" != "$PINNED_SHA256" ]; then
            echo "::error file=scripts/ci/check_oxide_divergence.sh::SHA-256 mismatch: actual=$ACTUAL pinned=$PINNED_SHA256. If this change is intentional, update PINNED_SHA256 in .github/workflows/shekyl-oxide-divergence.yml in the same commit."
            exit 2
          fi
          echo "[selftest] script SHA-256 pin OK ($ACTUAL)"

      - name: Build synthetic trees
        run: |
          set -euo pipefail
          BASE=$(mktemp -d)
          mkdir -p "$BASE/clean/crypto/fcmps/src" "$BASE/clean/crypto/inner" "$BASE/clean/shekyl-oxide/src"
          # Populate well above the 50-file threshold.
          for i in $(seq 1 80); do printf 'pub const N: u64 = %d;\n' "$i" > "$BASE/clean/crypto/fcmps/src/file_$i.rs"; done
          for i in $(seq 1 30); do printf 'pub const N: u64 = %d;\n' "$i" > "$BASE/clean/crypto/inner/file_$i.rs"; done
          for i in $(seq 1 30); do printf 'pub const N: u64 = %d;\n' "$i" > "$BASE/clean/shekyl-oxide/src/file_$i.rs"; done
          printf '[workspace]\nmembers = []\n' > "$BASE/clean/crypto/Cargo.toml"
          printf 'pub mod stub;\n' > "$BASE/clean/crypto/fcmps/src/lib.rs"
          cp -r "$BASE/clean" "$BASE/under-test"
          echo "BASE=$BASE" >> "$GITHUB_ENV"

      - name: Self-test — equal trees report OK (exit 0)
        run: |
          set -euo pipefail
          if scripts/ci/check_oxide_divergence.sh \
                --self-test-vendored="$BASE/under-test" \
                --self-test-fork="$BASE/clean" > /tmp/selftest-ok.log; then
            grep -q '\[OK\]' /tmp/selftest-ok.log || {
              echo "::error::script returned 0 without emitting [OK]"
              cat /tmp/selftest-ok.log
              exit 1
            }
            echo "[selftest] equal-trees case: exit 0, [OK] emitted — pass"
          else
            echo "::error::script returned non-zero on byte-equal trees"
            cat /tmp/selftest-ok.log
            exit 1
          fi

      - name: Self-test — dual mutation (deep + shallow) reported (exit 1)
        run: |
          set -uo pipefail
          # Deep mutation: append byte to crypto/fcmps/src/lib.rs.
          # Shallow mutation: append byte to crypto/Cargo.toml.
          # Both at depth-asymmetric paths to catch refactoring bugs in any
          # future path-rewriting logic.
          printf ' ' >> "$BASE/under-test/crypto/fcmps/src/lib.rs"
          printf ' ' >> "$BASE/under-test/crypto/Cargo.toml"

          scripts/ci/check_oxide_divergence.sh \
              --self-test-vendored="$BASE/under-test" \
              --self-test-fork="$BASE/clean" > /tmp/selftest-bad.log
          rc=$?

          if [ "$rc" != "1" ]; then
            echo "::error::script returned $rc on a tampered tree (expected 1 = divergence). exit 0 would mean the comparison logic is broken; exit 2 would mean an infra error masking real divergence."
            cat /tmp/selftest-bad.log
            exit 1
          fi

          if ! grep -q 'crypto/fcmps/src/lib.rs' /tmp/selftest-bad.log; then
            echo "::error::deep-path mutation not reported (crypto/fcmps/src/lib.rs missing from diff output)"
            cat /tmp/selftest-bad.log
            exit 1
          fi
          if ! grep -q 'crypto/Cargo.toml' /tmp/selftest-bad.log; then
            echo "::error::shallow-path mutation not reported (crypto/Cargo.toml missing from diff output) — likely a path-rewriter bug normalizing depth-asymmetric paths"
            cat /tmp/selftest-bad.log
            exit 1
          fi
          echo "[selftest] dual-mutation case: exit 1, both deep and shallow paths reported — pass"

      - name: Self-test — infra failure distinguishable (exit 2)
        run: |
          set -uo pipefail
          # Empty directory = below population threshold = infra error.
          EMPTY=$(mktemp -d)
          scripts/ci/check_oxide_divergence.sh \
              --self-test-vendored="$EMPTY" \
              --self-test-fork="$BASE/clean" > /tmp/selftest-infra.log 2>&1
          rc=$?
          if [ "$rc" != "2" ]; then
            echo "::error::script returned $rc on an empty tree (expected 2 = infra error). Collapsing exit 2 into exit 1 would mask infra failures as divergences and erode trust in the layered defense."
            cat /tmp/selftest-infra.log
            exit 1
          fi
          echo "[selftest] infra-failure case: exit 2 — pass"

  # ============================================================================
  # OXIDE-TREE-EQUALITY (Layers 2 + 3, observe-only).
  #
  # Always runs on PRs targeting dev/main and on pushes to dev/main. The
  # script fast-paths on cache hit, so wall time is small for runs where
  # rust/shekyl-oxide/ has not changed.
  #
  # Cache discipline: the cache contains *only* raw `git checkout` output
  # for the pinned commit, never derived computation. See script header.
  # ============================================================================
  oxide-tree-equality:
    name: oxide-tree-equality
    needs: selftest
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Read pinned commit
        id: pin
        run: |
          COMMIT=$(awk -F= '$1=="upstream_commit"{print $2}' rust/shekyl-oxide/UPSTREAM_MONERO_OXIDE_COMMIT)
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Restore fork checkout cache
        id: cache
        uses: actions/cache@v5
        with:
          # Key is ONLY the upstream commit. Do not include the script SHA;
          # cached content is the raw checkout, not derived from the script.
          path: ~/.cache/oxide-fork
          key: oxide-fork-${{ steps.pin.outputs.commit }}

      - name: Run divergence check
        env:
          OXIDE_FORK_CACHE_DIR: ${{ github.workspace }}/.cache/oxide-fork
        run: |
          set -uo pipefail
          mkdir -p "$OXIDE_FORK_CACHE_DIR"
          # Hydrate from action cache if present.
          if [ -d "$HOME/.cache/oxide-fork" ]; then
            cp -r "$HOME/.cache/oxide-fork/." "$OXIDE_FORK_CACHE_DIR/" 2>/dev/null || true
          fi

          scripts/ci/check_oxide_divergence.sh
          rc=$?
          if [ "$rc" = 2 ]; then
            # Infra failure — annotate as a workflow issue, not a status-check
            # failure. Keep the run yellow rather than red so people don't
            # treat infra blips as divergence.
            echo "::warning::oxide-divergence check could not complete (exit 2: infra). This is not a divergence; please re-run."
            exit 2
          fi
          # Persist cache for next run — only the raw checkout.
          mkdir -p "$HOME/.cache/oxide-fork"
          cp -r "$OXIDE_FORK_CACHE_DIR/." "$HOME/.cache/oxide-fork/" 2>/dev/null || true
          exit "$rc"

  # ============================================================================
  # LAYER 4 — daily hash-only tripwire (cron only).
  #
  # Independent of the byte-equality script: it asks `git ls-remote` whether
  # the fork has moved since we last pinned. This is a separate signal that
  # exists even if the byte-equality script is silently broken, so use of
  # `git` is the only thing in common between the layers (and even that only
  # for ls-remote, not for cloning trees).
  # ============================================================================
  compare-upstream-tip:
    name: shekyl-oxide upstream tip
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - name: Read vendored snapshot metadata
        id: snapshot
        run: |
          FILE="rust/shekyl-oxide/UPSTREAM_MONERO_OXIDE_COMMIT"
          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE"
            exit 1
          fi
          REPO=$(awk -F= '$1=="upstream_repo"{print $2}' "$FILE")
          BRANCH=$(awk -F= '$1=="upstream_branch"{print $2}' "$FILE")
          COMMIT=$(awk -F= '$1=="upstream_commit"{print $2}' "$FILE")
          if [ -z "$REPO" ] || [ -z "$BRANCH" ] || [ -z "$COMMIT" ]; then
            echo "Invalid snapshot metadata in $FILE"
            exit 1
          fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
      - name: Resolve fork tip
        id: remote
        run: |
          URL="${{ steps.snapshot.outputs.repo }}.git"
          BRANCH="${{ steps.snapshot.outputs.branch }}"
          TIP=$(git ls-remote "$URL" "refs/heads/$BRANCH" | awk '{print $1}')
          if [ -z "$TIP" ]; then
            echo "Failed to resolve remote tip for $URL $BRANCH"
            exit 1
          fi
          echo "tip=$TIP" >> "$GITHUB_OUTPUT"
      - name: Compare vendored snapshot to fork tip
        run: |
          SNAPSHOT="${{ steps.snapshot.outputs.commit }}"
          TIP="${{ steps.remote.outputs.tip }}"
          if [ "$SNAPSHOT" != "$TIP" ]; then
            echo "Vendored shekyl-oxide snapshot is behind/changed:"
            echo "  snapshot: $SNAPSHOT"
            echo "  fork tip: $TIP"
            echo "Sync rust/shekyl-oxide and update UPSTREAM_MONERO_OXIDE_COMMIT."
            exit 1
          fi
          echo "Vendored snapshot matches fork tip: $TIP"
