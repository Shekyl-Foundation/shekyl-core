name: "CodeQL Analysis"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "30 4 * * 1"   # Every Monday at 4:30 AM UTC

jobs:
  analyze-rust:
    name: Analyze Rust
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          config-file: ./.github/codeql/config.yml

      - name: Build Rust workspace
        # `shekyl-randomx-differential` excluded because its `c_oracle`
        # module (and the `gen_canonical_outputs` tooling binary) link
        # against the C reference's `librandomx.a` via `randomx-v2-sys`,
        # which requires `RANDOMX_V2_INSTALL_DIR` to be set to a CMake
        # install prefix (per `docs/design/RANDOMX_V2_PHASE2G_PLAN.md`
        # §5.1.16 + §5.2.2 R5-D2). The CodeQL Rust analysis runs in a
        # bare-toolchain environment without CMake or the C library; the
        # dedicated `.github/workflows/randomx-v2-differential.yml` job
        # (per §5.5.1) configures CMake, builds the C library, and runs
        # the harness build there. CodeQL Rust analysis of the
        # differential harness is queued for V3.x once the workflow's
        # CodeQL coverage can stand up the C library at analysis time.
        run: cargo build --release --workspace --exclude shekyl-cli --exclude shekyl-engine-rpc --exclude shekyl-randomx-differential
        working-directory: rust

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"

  analyze-cpp:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libboost-all-dev libssl-dev libunbound-dev \
            libsodium-dev libhidapi-dev libprotobuf-dev protobuf-compiler \
            libusb-1.0-0-dev libudev-dev libreadline-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          config-file: ./.github/codeql/config.yml

      - name: Configure and Build C++
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          cmake --build . -- -j$(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"

  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"