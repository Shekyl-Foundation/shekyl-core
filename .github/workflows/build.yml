name: ci/gh-actions/cli

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**/README.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/README.md'

permissions:
  contents: read

# The below variables reduce repetitions across similar targets
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # ARCH="default" (not "native") ensures, that a different execution host can execute binaries compiled elsewhere.
  BUILD_DEFAULT_LINUX: 'cmake -S . -B build -D ARCH="default" -D BUILD_TESTS=ON -D CMAKE_BUILD_TYPE=Release && cmake --build build --target all'
  APT_INSTALL_LINUX: 'apt -y install build-essential cmake libboost-all-dev miniupnpc libunbound-dev graphviz doxygen libunwind8-dev pkg-config libssl-dev libsodium-dev libhidapi-dev libusb-1.0-0-dev libprotobuf-dev protobuf-compiler ccache git curl'
  INSTALL_RUST: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    echo "$HOME/.cargo/bin" >> $GITHUB_PATH
  APT_SET_CONF: |
    tee -a /etc/apt/apt.conf.d/80-custom << EOF
    Acquire::Retries "3";
    Acquire::http::Timeout "120";
    Acquire::ftp::Timeout "120";
    EOF
  CCACHE_SETTINGS: |
    ccache --max-size=150M
    ccache --set-config=compression=true

jobs:
  lint-rust-debug-macros:
    name: 'Lint: no debug macros in production Rust'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: reject eprintln!/dbg!/println! in production Rust
        run: |
          # Strip line-comments (`//`, `///`, `//!`) before grepping so
          # doc-comments referencing the macros for *educational* reasons
          # — e.g. `/// would print bytes via dbg!() calls` — do not trip
          # the lint. The script's intent is "no debug-macro *invocations*
          # in production code"; a literal call requires `macro!(` and is
          # uneditable through comment text. False negatives from a
          # `dbg!(` substring inside a string literal are accepted as a
          # contrived corner case.
          # `*/src/bin/*` excluded because tooling binaries (e.g.
          # `shekyl-randomx-differential::src/bin/gen_canonical_outputs.rs`,
          # per `docs/design/RANDOMX_V2_PHASE2G_PLAN.md` §5.1.5) emit
          # operator-facing diagnostics + canonical Rust source on stdout;
          # the lint's "no debug macros in production Rust" framing is
          # designed against library code, not CLI tools whose contract is
          # to print. The exclusion is the same shape as `main.rs` (also
          # excluded above): binary-target source whose `println!` /
          # `eprintln!` calls are part of the documented surface.
          FOUND=0
          for f in $(find rust/shekyl-*/src -name '*.rs' \
                     ! -name 'build.rs' ! -name 'main.rs' ! -path '*/examples/*' \
                     ! -path '*/src/bin/*' \
                     ! -path '*/shekyl-cli/*'); do
            TEST_LINE=$(grep -n '#\[cfg(test)\]' "$f" | head -1 | cut -d: -f1)
            if [ -n "$TEST_LINE" ]; then
              HITS=$(head -n "$((TEST_LINE - 1))" "$f" \
                     | sed 's|//.*||' \
                     | grep -n 'eprintln!(\|dbg!(\|println!(' || true)
            else
              HITS=$(sed 's|//.*||' "$f" \
                     | grep -n 'eprintln!(\|dbg!(\|println!(' || true)
            fi
            if [ -n "$HITS" ]; then
              echo "$f:"
              echo "$HITS"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "FATAL: debug macros in production Rust (above #[cfg(test)])"
            exit 1
          fi
          echo "No debug macros in production Rust — OK"
      - name: enforce RandomX FPU rounding primitive scope
        run: scripts/ci/check_randomx_fpu_rounding.sh
      - name: enforce RandomX crate-level isolation invariants
        run: scripts/ci/check_randomx_crate_invariants.sh
      - name: reject BOOST_FOREACH in C++
        run: |
          HITS=$(grep -rn 'BOOST_FOREACH' src/ tests/ --include='*.cpp' --include='*.h' --include='*.hpp' || true)
          if [ -n "$HITS" ]; then
            echo "FATAL: BOOST_FOREACH found — use range-based for loops:"
            echo "$HITS"
            exit 1
          fi
          echo "No BOOST_FOREACH — OK"
      - name: reject direct POSIX-header includes in src/
        run: |
          # The three POSIX headers owned by src/common/compat.h:
          #   unistd.h, dlfcn.h, sys/mman.h
          # Every new site should #include "common/compat.h" instead of
          # repeating the _WIN32 / _MSC_VER guard dance inline.
          #
          # Allow-list (files whose direct include has an architectural
          # reason — OS-specific arms, vendored ref10 code, or compat.h
          # itself). Keep this list tight; prefer migrating new sites.
          ALLOW='^(src/common/compat\.h|src/common/compat/glibc_compat\.cpp|src/common/password\.cpp|src/cryptonote_basic/miner\.cpp|src/crypto/random\.c|src/crypto/oaes_lib\.c|src/crypto/crypto_ops_builder/randombytes\.c|src/crypto/slow-hash\.c):'
          HITS=$(grep -rnE '^[[:space:]]*#include[[:space:]]*<(unistd|dlfcn|sys/mman)\.h>' \
                 src/ --include='*.c' --include='*.cpp' --include='*.h' --include='*.hpp' \
                 | grep -vE "$ALLOW" || true)
          if [ -n "$HITS" ]; then
            echo "FATAL: direct POSIX-header include — use #include \"common/compat.h\":"
            echo "$HITS"
            exit 1
          fi
          echo "No unguarded POSIX-header includes outside compat.h — OK"

  build-macos:
    name: 'macOS (brew)'
    runs-on: macOS-latest
    env:
      CCACHE_TEMPDIR: /tmp/.ccache-temp
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: guard against absolute local Cargo paths
        run: |
          MATCHES=""
          while IFS= read -r file; do
            HITS="$(grep -nE '/home/|/Users/|[A-Za-z]:\\\\Users\\\\' "$file" || true)"
            if [ -n "$HITS" ]; then
              MATCHES="${MATCHES}${file}\n${HITS}\n"
            fi
          done < <(find rust -type f \( -name Cargo.toml -o -path '*/.cargo/config' -o -path '*/.cargo/config.toml' \))
          if [ -n "$MATCHES" ]; then
            echo "FATAL: detected absolute local paths in Cargo manifests/config:"
            printf "%b" "$MATCHES"
            exit 1
          fi
          echo "Cargo path portability guard passed."
      - uses: actions/cache@v5
        with:
          path: /Users/runner/Library/Caches/ccache
          key: ccache-${{ runner.os }}-build-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-build-
      - uses: ./.github/actions/set-make-job-count
      - name: install dependencies
        run: |
          brew uninstall cmake
          brew update
          brew install --quiet cmake boost hidapi openssl unbound libpgm miniupnpc expat libunwind-headers protobuf abseil ccache zstd
      - uses: dtolnay/rust-toolchain@stable
      - name: build
        run: |
          ${{env.CCACHE_SETTINGS}}
          make -j${{env.MAKE_JOB_COUNT}}

  build-windows:
    name: 'Windows (MSYS2)'
    runs-on: windows-latest
    env:
      CCACHE_TEMPDIR: C:\Users\runneradmin\.ccache-temp
      CCACHE_DIR: C:\Users\runneradmin\.ccache
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\.ccache
          key: ccache-${{ runner.os }}-build-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-build-
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-toolchain make mingw-w64-x86_64-cmake mingw-w64-x86_64-ccache mingw-w64-x86_64-boost mingw-w64-x86_64-openssl mingw-w64-x86_64-libsodium mingw-w64-x86_64-hidapi mingw-w64-x86_64-protobuf mingw-w64-x86_64-abseil-cpp mingw-w64-x86_64-libusb mingw-w64-x86_64-unbound mingw-w64-x86_64-rust git
      - uses: ./.github/actions/set-make-job-count
      - name: build
        run: |
          ${{env.CCACHE_SETTINGS}}
          make release-static-win64 -j${{env.MAKE_JOB_COUNT}}

  build-arch:
    name: 'Arch Linux'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: install dependencies
        run: pacman -Syyu --noconfirm base-devel git cmake boost boost-libs openssl unbound libsodium readline expat gtest python3 doxygen graphviz hidapi libusb protobuf abseil-cpp rust
      - name: configure git
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: ./.github/actions/set-make-job-count
      - name: build
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: ${{env.MAKE_JOB_COUNT}}
        run: ${{env.BUILD_DEFAULT_LINUX}}

  build-ubuntu:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported Ubuntu LTS (Boost >= 1.74)
          - name: Ubuntu 22.04
            container: ubuntu:22.04

          - name: Ubuntu 24.04
            container: ubuntu:24.04
    container:
      image: ${{ matrix.container }}
      env:
        DEBIAN_FRONTEND: noninteractive
        CCACHE_TEMPDIR: /tmp/.ccache-temp
        CCACHE_DIR: ~/.ccache
    steps:
      - name: set apt conf
        run: ${{env.APT_SET_CONF}}
      - name: update apt
        run: apt update
      - name: install build dependencies
        run: ${{env.APT_INSTALL_LINUX}}
      - name: install Rust
        run: ${{env.INSTALL_RUST}}
      - name: configure git
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.container }}-build-${{ github.sha }}
          restore-keys: ccache-${{ matrix.container }}-build-
      - uses: ./.github/actions/set-make-job-count
      - name: build
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: ${{env.MAKE_JOB_COUNT}}
        run: |
          ${{env.CCACHE_SETTINGS}}
          ${{env.BUILD_DEFAULT_LINUX}}

  test-ubuntu:
    name: "${{ matrix.name }} (tests)"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22.04
            container: ubuntu:22.04
          - name: Ubuntu 24.04
            container: ubuntu:24.04
    container:
      image: ${{ matrix.container }}
      env:
        DEBIAN_FRONTEND: noninteractive
        CCACHE_TEMPDIR: /tmp/.ccache-temp
        CCACHE_DIR: ~/.ccache
      # Setting up a loop device (losetup) requires additional capabilities.
      # tests/create_test_disks.sh
      options: --privileged
    steps:
      - name: set apt conf
        run: ${{env.APT_SET_CONF}}
      - name: update apt
        run: apt update
      - name: install build dependencies
        run: ${{env.APT_INSTALL_LINUX}}
      - name: install Rust
        run: ${{env.INSTALL_RUST}}
      - name: install Python dependencies
        run: apt install -y python3-requests python3-psutil python3-monotonic python3-deepdiff
      - name: configure git
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.container }}-build-${{ github.sha }}
          restore-keys: ccache-${{ matrix.container }}-build-
      - name: create dummy disk drives for testing
        run: tests/create_test_disks.sh >> $GITHUB_ENV
      - uses: ./.github/actions/set-make-job-count
      - name: tests
        env:
          CTEST_OUTPUT_ON_FAILURE: ON
          DNS_PUBLIC: tcp://9.9.9.9
          CMAKE_BUILD_PARALLEL_LEVEL: ${{env.MAKE_JOB_COUNT}}
        run: |
          ${{env.CCACHE_SETTINGS}}
          ${{env.BUILD_DEFAULT_LINUX}}
          cmake --build build --target test

  build-windows-msvc:
    name: 'Windows (MSVC, daemon+wallet+wallet-rpc)'
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: restore vcpkg cache
        uses: actions/cache/restore@v5
        id: vcpkg-cache
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg\installed
            C:\vcpkg\archives
          key: vcpkg-x64-windows-static-${{ hashFiles('.github/workflows/build.yml', 'vcpkg-overlay/**') }}
          restore-keys: vcpkg-x64-windows-static-
      - name: install vcpkg dependencies
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;files,C:\vcpkg\archives,readwrite
        run: |
          vcpkg install --triplet x64-windows-static --overlay-ports="${{ github.workspace }}/vcpkg-overlay/ports" boost openssl libsodium libusb lmdb
      - name: save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg\installed
            C:\vcpkg\archives
          key: vcpkg-x64-windows-static-${{ hashFiles('.github/workflows/build.yml', 'vcpkg-overlay/**') }}
      - name: configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 18 2026" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DSTATIC=ON `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTS=OFF `
            -DSTACK_TRACE=OFF `
            -DUSE_DEVICE_TREZOR=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static
      - name: build daemon, wallet, and wallet-rpc
        shell: pwsh
        run: |
          cmake --build build --config Release --target daemon wallet wallet_rpc_server --parallel 2
      - name: smoke-test daemonizer removal
        shell: pwsh
        # After the V3.1 daemonizer removal, shekyld.exe and
        # shekyl-wallet-rpc.exe must (a) link cleanly on MSVC without the
        # src/daemonizer/ subsystem, (b) run without invoking the removed
        # POSIX fork() / Windows SCM code paths, and (c) intercept the
        # retired CLI flags via src/common/removed_flags.{h,cpp}. --help
        # exits 0 after printing the option list, which exercises the full
        # argument-parsing + logger-init path without waiting on a network
        # port. --detach is expected to exit nonzero with the V3.1
        # migration message; grepping the message pins the shim so a
        # future regression ("unknown option --detach") fails CI loudly
        # rather than shipping as a user-visible downgrade. The checks
        # are intentionally Windows-only because POSIX fork / Windows SCM
        # behaviors diverge at exactly this boundary.
        run: |
          # Native invocations go through `cmd /c` rather than PowerShell's `&`
          # operator. The previous two iterations of this step hit PowerShell
          # gotchas (array-vs-scalar -notmatch on 2>&1 output, then
          # $PSNativeCommandUseErrorActionPreference turning expected-nonzero
          # exits into terminating errors before $LASTEXITCODE could be read).
          # cmd.exe has none of that behavior — exit code is just the exit
          # code, stderr merges to the file via `2>&1` without any ErrorRecord
          # elevation. PowerShell is reduced to "inspect $LASTEXITCODE" and
          # "Select-String on a file," which are the well-behaved parts.
          $ErrorActionPreference = 'Stop'
          $daemon = 'build\bin\Release\shekyld.exe'
          $wrpc   = 'build\bin\Release\shekyl-wallet-rpc.exe'

          function Assert-HelpOk([string]$exe, [string]$label) {
            cmd /c "`"$exe`" --help > NUL 2>&1"
            if ($LASTEXITCODE -ne 0) {
              throw "$label --help failed with exit $LASTEXITCODE"
            }
          }

          function Assert-RemovedFlag([string]$exe, [string]$label, [string]$flag) {
            $outFile = New-TemporaryFile
            try {
              cmd /c "`"$exe`" $flag > `"$outFile`" 2>&1"
              $exit = $LASTEXITCODE
              $out  = Get-Content -Raw -LiteralPath $outFile
              if ($exit -eq 0) {
                throw "$label $flag unexpectedly succeeded; output: $out"
              }
              if ($out -notmatch 'was removed in V3\.1') {
                throw "$label $flag did not produce the V3.1 migration message; output: $out"
              }
            } finally {
              Remove-Item -LiteralPath $outFile -ErrorAction SilentlyContinue
            }
          }

          Assert-HelpOk $daemon 'shekyld'
          Assert-HelpOk $wrpc   'shekyl-wallet-rpc'
          Assert-RemovedFlag $daemon 'shekyld'           '--detach'
          Assert-RemovedFlag $wrpc   'shekyl-wallet-rpc' '--pidfile=C:\temp\x'

          # Both Assert-RemovedFlag calls deliberately leave $LASTEXITCODE
          # nonzero — that's exactly what we're asserting on. GitHub Actions'
          # pwsh shell wrapper is literally:
          #     pwsh -Command ". '$script'; if (Test-Path variable:\LASTEXITCODE) { exit $LASTEXITCODE }"
          # so a script that returns successfully but leaves $LASTEXITCODE=1
          # behind (from the last native command) gets miscategorized as a
          # failed step. Reset explicitly. Any earlier failure fires `throw`
          # inside the Assert-* helpers, which aborts before we get here, so
          # this only runs on genuine success.
          exit 0

  source-archive:
    name: "source archive"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: set apt conf
        run: ${{env.APT_SET_CONF}}
      - name: update apt
        run: apt update
      - name: install dependencies
        run: apt install -y git python3-pip
      - name: configure git
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
      - name: archive
        run: |
          pip install git-archive-all
          # Restrict `git describe` to release tags (`v*`). Otherwise the
          # `archive/<branch>-<date>` annotated tags created by the
          # branch-archival policy in `.cursor/rules/06-branching.mdc` rule 5
          # become the closest reachable tag once they land on a commit
          # ancestor of the branch under test, and `VERSION` ends up
          # containing a `/` (e.g. `shekyl-archive/<branch>-<date>`), which
          # makes `git-archive-all` write to a non-existent directory and
          # fails the job with `[Errno 2] No such file or directory`.
          export VERSION="shekyl-$(git describe --match 'v*')"
          export OUTPUT="$VERSION.tar"
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV
          git-archive-all --prefix "$VERSION/" --force-submodules "$OUTPUT"
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ env.OUTPUT }}
          path: ${{ env.OUTPUT }}

  rust-audit-and-test:
    name: "Rust: audit, test, determinism"
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: set apt conf
        run: ${{env.APT_SET_CONF}}
      - name: update apt
        run: apt update
      - name: install dependencies
        run: apt -y install build-essential git curl pkg-config libssl-dev
      - name: install Rust
        run: ${{env.INSTALL_RUST}}
      - name: configure git
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: guard against absolute local Cargo paths
        shell: bash
        run: |
          MATCHES=""
          while IFS= read -r file; do
            HITS="$(grep -nE '/home/|/Users/|[A-Za-z]:\\\\Users\\\\' "$file" || true)"
            if [ -n "$HITS" ]; then
              MATCHES="${MATCHES}${file}\n${HITS}\n"
            fi
          done < <(find rust -type f \( -name Cargo.toml -o -path '*/.cargo/config' -o -path '*/.cargo/config.toml' \))
          if [ -n "$MATCHES" ]; then
            echo "FATAL: detected absolute local paths in Cargo manifests/config:"
            printf "%b" "$MATCHES"
            exit 1
          fi
          echo "Cargo path portability guard passed."
      - name: verify x86_64 architecture
        run: |
          ARCH=$(uname -m)
          echo "Runner architecture: $ARCH"
          if [ "$ARCH" != "x86_64" ]; then
            echo "FATAL: expected x86_64 runner, got $ARCH"
            exit 1
          fi
      - name: verify fuzz harness inventory (smoke gate)
        shell: bash
        run: |
          REQUIRED_TARGETS=(
            rust/shekyl-fcmp/fuzz/fuzz_targets/fuzz_fcmp_proof_deserialize.rs
            rust/shekyl-fcmp/fuzz/fuzz_targets/fuzz_curve_tree_leaf_hash.rs
            rust/shekyl-fcmp/fuzz/fuzz_targets/fuzz_block_header_tree_root.rs
            rust/shekyl-fcmp/fuzz/fuzz_targets/fuzz_tx_deserialize_fcmp_type7.rs
            rust/shekyl-staking/fuzz/fuzz_targets/fuzz_claim_reward.rs
            rust/shekyl-crypto-pq/fuzz/fuzz_targets/fuzz_kem_decapsulate.rs
            rust/shekyl-crypto-pq/fuzz/fuzz_targets/fuzz_bech32m_address_decode.rs
            rust/shekyl-crypto-pq/fuzz/fuzz_targets/fuzz_multisig_verify.rs
            rust/shekyl-crypto-pq/fuzz/fuzz_targets/fuzz_multisig_key_blob.rs
            rust/shekyl-crypto-pq/fuzz/fuzz_targets/fuzz_multisig_sig_blob.rs
            rust/shekyl-crypto-pq/fuzz/fuzz_targets/fuzz_group_id.rs
          )
          MISSING=0
          for target in "${REQUIRED_TARGETS[@]}"; do
            if [ ! -f "$target" ]; then
              echo "FATAL: missing required fuzz harness: $target"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi
          echo "Fuzz harness inventory smoke gate passed (${#REQUIRED_TARGETS[@]} targets present)."
      - uses: Swatinem/rust-cache@v2
        with:
          # Workspace at rust/ with target dir at rust/target/.
          # Swatinem auto-caches ~/.cargo/{registry,git,bin} plus the
          # workspace target/. The default cache key already mixes
          # rustc version + Cargo.lock hash + a per-job component, so
          # toolchain bumps (e.g. 1.94.0 -> 1.95.0) and lockfile-only
          # diffs (e.g. deps/bump-rand-to-0.8.6) get correctly-scoped
          # invalidation. Replaces the prior actions/cache@v5 block,
          # which had three known waste modes documented in
          # docs/CI_TIMING_BASELINE.md:
          #   - ~8m post-job upload of the entire target/ even when
          #     only a few crates changed (Swatinem only writes deltas).
          #   - No rustc-version key component (so a 1.94 -> 1.95 bump
          #     would have silently restored a 1.94-built target/).
          #   - No ~/.cargo/bin caching (cargo-audit reinstalled from
          #     source every run, ~2m30s).
          workspaces: rust -> target
      - name: install cargo-audit
        # `cargo install --locked` is idempotent: on Swatinem cache
        # hits the binary is already present in ~/.cargo/bin and this
        # step exits in a few seconds rather than recompiling from
        # source. Moved here from pre-checkout so the cache restore
        # has a chance to populate ~/.cargo/bin first.
        run: cargo install cargo-audit --locked
      - name: cargo audit
        working-directory: rust
        run: |
          # Retry wrapper: `cargo audit` fetches the RustSec advisory DB
          # from https://github.com/RustSec/advisory-db.git on every run.
          # That endpoint occasionally returns HTTP 500 under load; the
          # failure is transient and unrelated to our Cargo.lock.
          # Three attempts with backoff cover the common infra-flake window.
          # A genuine advisory hit will still fail every attempt (the audit
          # logic is deterministic given a successful DB fetch), so this
          # does not mask real findings — it only burns ~30s extra CI time
          # before re-reporting the hit on a permanent fail.
          for attempt in 1 2 3; do
            if cargo audit; then
              exit 0
            fi
            echo "cargo audit attempt ${attempt} failed; retrying in $((attempt * 10))s" >&2
            sleep $((attempt * 10))
          done
          echo "cargo audit failed after 3 attempts" >&2
          exit 1
      - name: cargo fmt --check (workspace)
        working-directory: rust
        # Fails CI on any unformatted Rust file. Pairs with the clippy
        # gate below; both land together in chore/workspace-fmt-clippy-
        # baseline. Pre-existing fmt debt was discharged in that PR's
        # first commit (`cargo fmt --all` over the whole workspace) and
        # the .cursor/rules/15-deletion-and-debt.mdc carve-out
        # (refined in the same commit) makes "leave the file you
        # touched fmt-clean" the going-forward expectation.
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings (workspace, all targets)
        working-directory: rust
        # Fails CI on any clippy finding (warning or error). The
        # workspace's [lints.clippy] section in rust/Cargo.toml already
        # configures many lints at deny-level (let_underscore_must_use,
        # cast_possible_truncation, uninlined_format_args, …); this
        # gate adds `-D warnings` so the remaining default-warn lints
        # (clone_on_copy, type_complexity, dead_code, …) are equally
        # enforced. `--keep-going` collects findings across the whole
        # workspace in one pass instead of stopping at the first crate's
        # first error, so reviewers see the full triage in one log.
        run: cargo clippy --workspace --all-targets --keep-going -- -D warnings
      - name: build shekyl-fcmp crate
        working-directory: rust
        run: cargo build --locked -p shekyl-fcmp
      - name: cargo test (all workspace crates)
        working-directory: rust
        # `shekyl-randomx-differential` excluded from the workspace-wide
        # test because its `c_oracle` module links against the C
        # reference's `librandomx.a` via `randomx-v2-sys`, which requires
        # the `RANDOMX_V2_INSTALL_DIR` env var to point at a CMake-built
        # install prefix (per `docs/design/RANDOMX_V2_PHASE2G_PLAN.md`
        # §5.1.16 + §5.2.2 R5-D2). The `rust-audit-and-test` job does not
        # configure CMake or build the C library; that work lives in the
        # dedicated `.github/workflows/randomx-v2-differential.yml`
        # workflow (per §5.5.1 + R1-D12), which builds the C library and
        # runs `cargo test -p shekyl-randomx-differential` with the env
        # var set. Excluding here is the discipline-correct shape:
        # workspace-wide test asserts every crate that builds in the
        # bare-Rust environment passes; the differential harness asserts
        # under its own substrate-correct environment.
        run: cargo test --locked --workspace --exclude shekyl-randomx-differential
      - name: "Gate 1: proptest (--release for speed)"
        working-directory: rust
        run: cargo test --locked --release -p shekyl-crypto-pq --test prop_round_trip
      - name: "Gate 2: shekyl-pow-randomx debug-vs-release equivalence"
        # Per `docs/design/RANDOMX_V2_PHASE2C_PLAN.md` §5.11.3 R4:
        # Rust integer-overflow semantics differ between debug (panic)
        # and release (wrapping). The verifier ships release. Any 2c
        # arithmetic that accidentally uses `+`/`*` where it should use
        # `wrapping_add`/`wrapping_mul` is invisible to debug-mode
        # `cargo test` but produces a different hash for overflow
        # inputs in release. The T1-T8 spec-vector tests (commit 7)
        # contain byte-equality assertions against fork-generated
        # fixtures; re-running them under `--release` asserts that
        # release-profile output matches debug-profile output (both
        # match the fork). Any divergence fails the PR.
        #
        # Cost: ~50 s additional CI wall-clock (measured on the
        # i9-11950H reference machine; CI hardware likely differs).
        # The §5.11.3 cost estimate was ~30 s under the planned ~200 ms
        # per-`Cache::derive` budget; R0-D12 (see
        # `docs/design/RANDOMX_V2_PHASE2C_PLAN.md` §14 + `BENCH_RESULTS.md`)
        # measured ~341 ms median, which inflates T1''s 100-iteration
        # determinism property test from ~26 s → ~34 s and pushes total
        # release-test wall-clock to ~47 s. The cost increase is
        # acceptable: T1'/T2'/T3'–T8' determinism properties are
        # plan-doc-mandated per §5.11.1 with an explicit reopening
        # criterion that names the audits-are-clean-so-compress anti-
        # pattern, i.e. "remove the non-determinism source, not the
        # property test." Acceptable for the consensus-split-bug class
        # this gate catches.
        working-directory: rust
        run: cargo test --locked --release -p shekyl-pow-randomx
      - name: Bech32m address encoding tests
        working-directory: rust
        run: cargo test --locked -p shekyl-crypto-pq -- address
      - name: "CI grep gate: no shekyl_y in C++ source"
        run: |
          if grep -rn 'shekyl_y' src/crypto/ src/wallet/ --include='*.cpp' --include='*.h'; then
            echo "FATAL: 'shekyl_y' salt still present in C++ source"
            exit 1
          fi
          echo "PASS: no shekyl_y in C++ source"
      - name: "CI grep gate: no derivation_to_y_scalar in C++ source"
        run: |
          if grep -rn 'derivation_to_y_scalar' src/crypto/ src/wallet/ --include='*.cpp' --include='*.h'; then
            echo "FATAL: derivation_to_y_scalar still present in C++ source"
            exit 1
          fi
          echo "PASS: no derivation_to_y_scalar in C++ source"
      - name: "CI grep gate: no RCTTypeFull/Simple/Bulletproof in C++ source"
        run: |
          if grep -rn 'RCTTypeFull\|RCTTypeSimple\|RCTTypeBulletproof[^P]' src/ --include='*.cpp' --include='*.h'; then
            echo "FATAL: legacy RCT types still referenced in C++ source"
            exit 1
          fi
          echo "PASS: no legacy RCT types"
      - name: "CI grep gate: no v1/v2 tx version branches"
        run: |
          if grep -rn 'tx\.version\s*==\s*1\b\|tx\.version\s*<\s*2\b\|hf_version\s*<\s*1\b' src/ --include='*.cpp' --include='*.h'; then
            echo "FATAL: legacy v1/v2 transaction version checks still present"
            exit 1
          fi
          echo "PASS: no v1/v2 tx version branches"
      - name: "CI grep gate: no HASH_KEY_TXPROOF in C++ source"
        run: |
          if grep -rn 'HASH_KEY_TXPROOF' --include='*.cpp' --include='*.h' src/ tests/; then
            echo "FATAL: legacy HASH_KEY_TXPROOF still referenced"
            exit 1
          fi
          echo "PASS: no HASH_KEY_TXPROOF"
      - name: "CI grep gate: combined_shared_secret confined to wallet"
        run: |
          if grep -rn 'combined_shared_secret' --include='*.cpp' --include='*.h' src/common/ src/rpc/ src/cryptonote_protocol/; then
            echo "FATAL: combined_shared_secret leaked outside wallet boundary"
            exit 1
          fi
          echo "PASS: combined_shared_secret confined"
      - name: "CI grep gate: no ecdhEncode/ecdhDecode outside Ledger"
        run: |
          if grep -rn 'ecdhEncode\|ecdhDecode' --include='*.cpp' --include='*.h' src/ | grep -v device_ledger; then
            echo "FATAL: ecdhEncode/ecdhDecode used outside Ledger gate"
            exit 1
          fi
          echo "PASS: no ecdhEncode/ecdhDecode outside Ledger"
      - name: "CI grep gate: no direct dalek_ff_group 0.4 usage"
        working-directory: rust
        run: |
          # Design intent (see docs/FOLLOWUPS.md "dalek-ff-group version isolation"):
          #
          # The workspace carries two dalek-ff-group versions:
          #   0.5.x — used directly by shekyl crates
          #   0.4.x — pulled transitively by vendored serai/ciphersuite internals
          #
          # Direct dalek_ff_group usage in our source is allowed (must resolve
          # to 0.5). The informational grep below prints matches for visibility
          # but does NOT fail — legitimate 0.5 usage is expected.
          #
          # The structural check below asserts that none of our crates pull
          # 0.4 as a *normal* (non-dev, non-build) dependency. If upstream
          # ciphersuite upgrades to 0.5, this gate can be removed entirely.
          DIRECT=$(grep -rn 'dalek_ff_group' --include='*.rs' \
                   shekyl-*/src shekyl-ffi/src shekyl-ffi/tests 2>/dev/null \
                   | grep -v '^\s*//' || true)
          if [ -n "$DIRECT" ]; then
            echo "Files referencing dalek_ff_group directly (must all resolve to 0.5):"
            echo "$DIRECT"
          fi
          # Fail if any shekyl crate has a normal dependency on the 0.4 line
          for crate in shekyl-ffi shekyl-fcmp shekyl-crypto-pq shekyl-proofs shekyl-tx-builder shekyl-scanner shekyl-engine-rpc shekyl-daemon-rpc; do
            if cargo tree -p "$crate" --edges normal 2>/dev/null \
               | grep 'dalek-ff-group v0\.4'; then
              echo "FATAL: $crate has a normal (non-dev) dependency on dalek-ff-group 0.4"
              exit 1
            fi
          done
          echo "PASS: all shekyl crates isolated from dalek-ff-group 0.4"
      - name: determinism check (build twice, compare hashes)
        working-directory: rust
        run: |
          cargo build --locked --release -p shekyl-ffi
          sha256sum target/release/libshekyl_ffi.a > /tmp/build1.sha256
          cargo clean -p shekyl-ffi --release
          cargo build --locked --release -p shekyl-ffi
          sha256sum target/release/libshekyl_ffi.a > /tmp/build2.sha256
          echo "=== Build 1 ===" && cat /tmp/build1.sha256
          echo "=== Build 2 ===" && cat /tmp/build2.sha256
          diff /tmp/build1.sha256 /tmp/build2.sha256 || (echo "FATAL: non-deterministic Rust build" && exit 1)
          echo "Determinism check PASSED"
      - name: "rust-cache post-run ENOENT workaround (Swatinem/rust-cache#144)"
        # Swatinem/rust-cache@v2's post-run cleanup walker
        # (src/cleanup.ts cleanProfileTarget) treats any subdirectory
        # of `target/` named `tests` as a kaos/macrotest/trybuild
        # nested-workspace layout and recursively cleans both
        # `tests/target/` and `tests/trybuild/`. The recursive
        # cleanTargetDir calls are NOT awaited, so async ENOENT
        # rejections on missing paths escape the synchronous
        # try/catch and surface as `##[error]ENOENT: opendir
        # rust/target/tests/target` annotations in the job summary.
        #
        # The error is non-fatal (the action continues, the job
        # concludes success), but the annotation pollutes the run
        # summary and obscures real errors. Upstream issue:
        #   https://github.com/Swatinem/rust-cache/issues/144 (open
        #   since 2023, no merged fix)
        #
        # Why we hit it: rust/shekyl-logging/tests/trybuild.rs uses
        # dtolnay/trybuild, which creates rust/target/tests/trybuild/.
        # We do NOT use kaos/macrotest, so rust/target/tests/target/
        # never gets created. Swatinem's walker tries it anyway.
        #
        # Workaround: pre-create the empty directory so the action's
        # opendir call succeeds (and finds nothing to clean). Cache
        # cost: a single empty directory entry, negligible.
        #
        # Removal condition: when Swatinem/rust-cache merges either
        # the proposed `if (e.code === "ENOENT") continue;` patch or
        # adds `await` to the recursive cleanTargetDir calls in
        # cleanProfileTarget, this step can be deleted in the same
        # PR that bumps the action pin.
        if: always()
        run: mkdir -p rust/target/tests/target
